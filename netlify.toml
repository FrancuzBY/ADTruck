[build]
  command = "npm run build"
  publish = "dist"

# SPA deep-links (дублирует public/_redirects на случай отсутствия файла).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker не кэшируем на CDN — свежая версия на демо (autoUpdate).
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
